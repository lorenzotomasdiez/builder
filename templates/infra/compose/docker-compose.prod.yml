# Production Docker Compose
# Production environment with nginx reverse proxy

version: "3.8"

services:
  nginx:
    image: {{PROJECT_NAME}}-nginx:latest
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "{{NGINX_PORT}}:{{NGINX_PORT}}"
      - "{{NGINX_PORT_SSL}}:{{NGINX_PORT_SSL}}"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - api
      - frontend
    networks:
      - {{PROJECT_NAME}}-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  api:
    image: {{PROJECT_NAME}}-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "{{API_PORT}}"
    environment:
      - DATABASE_URL=postgresql://{{POSTGRES_USER}}:{{POSTGRES_PASSWORD}}@postgres:{{POSTGRES_PORT}}/{{POSTGRES_DB}}
      - REDIS_URL=redis://redis:{{REDIS_PORT}}/0
      - DEBUG=false
      - ENVIRONMENT=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - {{PROJECT_NAME}}-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
      replicas: 2

  worker:
    image: {{PROJECT_NAME}}-worker:latest
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - DATABASE_URL=postgresql://{{POSTGRES_USER}}:{{POSTGRES_PASSWORD}}@postgres:{{POSTGRES_PORT}}/{{POSTGRES_DB}}
      - REDIS_URL=redis://redis:{{REDIS_PORT}}/0
      - DEBUG=false
      - ENVIRONMENT=production
    depends_on:
      - postgres
      - redis
    networks:
      - {{PROJECT_NAME}}-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
      replicas: 2

  postgres:
    image: postgres:{{POSTGRES_VERSION}}-alpine
    environment:
      - POSTGRES_USER={{POSTGRES_USER}}
      - POSTGRES_PASSWORD={{POSTGRES_PASSWORD}}
      - POSTGRES_DB={{POSTGRES_DB}}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U {{POSTGRES_USER}} -d {{POSTGRES_DB}}"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - {{PROJECT_NAME}}-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  redis:
    image: redis:{{REDIS_VERSION}}-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - {{PROJECT_NAME}}-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  frontend:
    image: {{PROJECT_NAME}}-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
    expose:
      - "{{FRONTEND_PORT}}"
    environment:
      - API_URL=http://api:{{API_PORT}}
      - ENVIRONMENT=production
    depends_on:
      - api
    networks:
      - {{PROJECT_NAME}}-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

volumes:
  postgres_prod_data:
  redis_prod_data:
  certbot_certs:

networks:
  {{PROJECT_NAME}}-network:
    driver: bridge
